<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태블릿 불편사항 접수</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <div class="card">
      <h1 class="title">태블릿 불편사항 접수</h1>

      <!-- 접수 폼 -->
      <form id="submit-form" class="form" novalidate>
        <div class="row">
          <div class="field">
            <label for="grade">학년</label>
            <select id="grade" required>
              <option value="">선택</option>
              <option value="1학년">1학년</option>
              <option value="2학년">2학년</option>
              <option value="3학년">3학년</option>
              <option value="4학년">4학년</option>
              <option value="5학년">5학년</option>
              <option value="6학년">6학년</option>
            </select>
          </div>
          <div class="field">
            <label for="cls">반</label>
            <select id="cls" required>
              <option value="">선택</option>
              <option value="1반">1반</option>
              <option value="2반">2반</option>
              <option value="3반">3반</option>
              <option value="4반">4반</option>
              <option value="5반">5반</option>
              <option value="6반">6반</option>
              <option value="7반">7반</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="tablet">태블릿 번호</label>
          <input id="tablet" type="text" placeholder="예) 테블릿 구글ID 번호만">
        </div>

        <div class="field">
          <label for="detail">상세장애내용</label>
          <textarea id="detail" rows="3" placeholder="상세 장애 내용을 입력하세요 (테블릿 특정 비밀번호가 있으면 꼭 기록해 주세요./ 초기화 해도 되나요? 초기화 하면 앱과 파일이 지워질수 있어요. )" required></textarea>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary">
          <span class="btn-label">접수하기</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </form>

      <p id="submit-msg" class="msg" role="status" aria-live="polite" hidden></p>

      <!-- 조회 섹션 -->
      <section class="search-section">
        <div class="row search-row">
          <div class="field">
            <label for="search-grade">학년</label>
            <select id="search-grade">
              <option value="">전체</option>
              <option value="1학년">1학년</option>
              <option value="2학년">2학년</option>
              <option value="3학년">3학년</option>
              <option value="4학년">4학년</option>
              <option value="5학년">5학년</option>
              <option value="6학년">6학년</option>
            </select>
          </div>
          <div class="field">
            <label for="search-class">반</label>
            <select id="search-class">
              <option value="">전체</option>
              <option value="1반">1반</option>
              <option value="2반">2반</option>
              <option value="3반">3반</option>
              <option value="4반">4반</option>
              <option value="5반">5반</option>
              <option value="6반">6반</option>
              <option value="7반">7반</option>
            </select>
          </div>
          <button type="button" id="search-btn" class="btn btn-primary btn-search">
            <span class="btn-label">조회하기</span>
            <span class="btn-spinner" hidden></span>
          </button>
        </div>

        <div id="results" class="results" hidden>
          <div class="table-wrap">
            <table>
              <colgroup>
                <col style="width:8%">
                <col style="width:8%">
                <col style="width:13%">
                <col style="width:46%">
                <col style="width:12%">
                <col style="width:13%">
              </colgroup>
              <thead>
                <tr>
                  <th>학년</th>
                  <th>반</th>
                  <th>테블릿번호</th>
                  <th class="col-detail">상세장애내용</th>
                  <th>접수일</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>
        </div>

        <p id="empty-msg" class="empty-msg" hidden>검색 결과가 없습니다.</p>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
